name: Passing variables across jobs

on: workflow_dispatch

jobs:
  producer:
    runs-on: ubutnu-latest
    
    outputs: 
      username: ${{steps.generate.outputs.name}}
    
    steps: 
      - name: generate output
        id: generate
        run: echo "name = Mehak" >> $GITHUB_OUTPUT

  consumer:
    runs-on: ubuntu-latest

    needs: producer

    steps: 
      - name: Print output
        run: echo "${needs.producer.outputs.username}"